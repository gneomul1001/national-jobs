<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가 취업 가상 포털</title>
    <style>
        /* 기본 스타일 및 Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f4f6fa;
            color: #333;
            line-height: 1.5;
        }

        /* 헤더 & 검색 영역 */
        header {
            background-color: #ffffff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0059cc;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #0059cc;
            letter-spacing: -1px;
            cursor: pointer;
        }
        .search-area {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 450px;
        }
        .search-area input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #0059cc;
            border-radius: 4px 0 0 4px;
            outline: none;
            font-size: 15px;
        }
        .search-area button {
            padding: 10px 20px;
            background-color: #0059cc;
            color: #fff;
            border: 2px solid #0059cc;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        .search-area button:hover { background-color: #004499; }

        /* 내비게이션 바 */
        nav {
            background-color: #0059cc;
            display: flex;
            padding: 0 20px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        nav::-webkit-scrollbar { display: none; }
        nav div {
            padding: 15px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        nav div:hover, nav div.active { background-color: #003d8c; }

        /* 메인 컨테이너 */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            min-height: 500px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 컨트롤 패널 */
        .control-panel {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e5e5e5;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filters { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
        .filters select {
            padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; max-width: 100%;
        }

        /* 버튼 스타일 */
        .btn {
            padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer;
            font-size: 13px; font-weight: bold; color: #fff;
            display: inline-flex; align-items: center; justify-content: center; gap: 3px;
        }
        .btn-add { background-color: #0059cc; padding: 10px 15px; font-size: 14px;}
        .btn-edit { background-color: #28a745; margin-right: 4px; }
        .btn-delete { background-color: #dc3545; }
        .btn-info { background-color: #17a2b8; margin-right: 4px;}
        .btn-secondary { background-color: #6c757d; padding: 10px 15px; font-size: 14px; margin-right: 5px;}
        .btn:hover { opacity: 0.9; }

        /* 테이블 스타일 */
        .table-responsive {
            width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #e5e5e5; border-radius: 4px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border-bottom: 1px solid #e5e5e5; padding: 14px 12px; text-align: center; font-size: 14px; }
        th { background-color: #f1f3f5; font-weight: bold; color: #333; border-bottom: 2px solid #dee2e6; }
        td.left-align { text-align: left; }
        h2 { margin-top: 0; color: #111; font-size: 22px; margin-bottom: 15px; }

        /* 모달 팝업 스타일 */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background-color: #fff; padding: 25px; border-radius: 8px; width: 100%; max-width: 550px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-header {
            font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }
        .modal-body { display: flex; flex-direction: column; gap: 12px; }
        .modal-body label { font-size: 14px; font-weight: bold; color: #555; }
        .modal-body input, .modal-body select, .modal-body textarea {
            padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 100%;
        }
        .modal-body textarea { resize: vertical; min-height: 80px; }
        .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

        /* 카테고리 관리용 리스트 스타일 */
        .category-list { border: 1px solid #ddd; border-radius: 4px; max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .category-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .category-item:last-child { border-bottom: none; }
        .category-input-group { display: flex; gap: 10px; }
        .category-input-group input { flex: 1; }

        /* 상세정보 보기 스타일 */
        .detail-row { display: flex; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .detail-label { font-weight: bold; width: 120px; color: #0059cc; flex-shrink: 0; }
        .detail-value { flex: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            header { padding: 15px 20px; justify-content: center; }
            .logo { text-align: center; width: 100%; }
            .search-area { max-width: 100%; }
            .container { padding: 15px; margin: 10px; }
            .control-panel { flex-direction: column; align-items: stretch; }
            .filters { flex-direction: column; align-items: stretch; }
            .btn-add, .btn-secondary { width: 100%; text-align: center; margin-bottom: 5px; }
            th, td { padding: 10px 8px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">JobPortal</div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="기업명, 키워드 검색">
            <button onclick="searchKeyword()">검색</button>
        </div>
    </header>

    <nav>
        <div class="nav-item active" onclick="switchTab('region-jobs', this)">지역별 공고</div>
        <div class="nav-item" onclick="switchTab('industry-jobs', this)">업종별 공고</div>
        <div class="nav-item" onclick="switchTab('cert-info', this)">자격증 정보</div>
        <div class="nav-item" onclick="switchTab('national-companies', this)">전국 기업정보</div>
        <div class="nav-item" onclick="switchTab('global-companies', this)">세계 기업정보</div>
    </nav>

    <div class="container">
        
        <div id="region-jobs" class="tab-content active">
            <h2>지역별 공고 관리</h2>
            <div class="control-panel">
                <button class="btn btn-add" onclick="openAddModal('region-jobs')">+ 공고 추가</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>지역</th><th>기업명</th><th>공고 제목</th><th>관리</th></tr></thead>
                    <tbody id="tbody-region-jobs"></tbody>
                </table>
            </div>
        </div>

        <div id="industry-jobs" class="tab-content">
            <h2>업종별 공고 관리</h2>
            <div class="control-panel">
                <button class="btn btn-add" onclick="openAddModal('industry-jobs')">+ 공고 추가</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>업종 분류</th><th>기업명</th><th>공고 제목</th><th>관리</th></tr></thead>
                    <tbody id="tbody-industry-jobs"></tbody>
                </table>
            </div>
        </div>

        <div id="cert-info" class="tab-content">
            <h2>자격증 정보 관리</h2>
            <div class="control-panel">
                <button class="btn btn-add" onclick="openAddModal('cert-info')">+ 자격증 추가</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>분야(카테고리)</th><th>자격증명</th><th>시행기관</th><th>관리</th></tr></thead>
                    <tbody id="tbody-cert-info"></tbody>
                </table>
            </div>
        </div>

        <div id="national-companies" class="tab-content">
            <h2>전국 기업정보 관리</h2>
            <div class="control-panel">
                <div class="filters">
                    <select id="filter-nat" onchange="filterTable('national-companies', this.value)">
                        <option value="">-- 등록된 지역 필터링 --</option>
                    </select>
                </div>
                <div>
                    <button class="btn btn-secondary" onclick="openCategoryModal('national')">⚙ 지역 카테고리 관리</button>
                    <button class="btn btn-add" onclick="openAddModal('national-companies')">+ 기업 상세 추가</button>
                </div>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>행정구역</th><th>기업명</th><th>규모</th><th>관리</th></tr>
                    </thead>
                    <tbody id="tbody-national-companies"></tbody>
                </table>
            </div>
        </div>

        <div id="global-companies" class="tab-content">
            <h2>세계 기업정보 관리</h2>
            <div class="control-panel">
                <div class="filters">
                    <select id="filter-glob" onchange="filterTable('global-companies', this.value)">
                        <option value="">-- 등록된 세계지역 필터링 --</option>
                    </select>
                </div>
                <div>
                    <button class="btn btn-secondary" onclick="openCategoryModal('global')">⚙ 지역 카테고리 관리</button>
                    <button class="btn btn-add" onclick="openAddModal('global-companies')">+ 기업 상세 추가</button>
                </div>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>글로벌 위치</th><th>기업명</th><th>산업분야</th><th>관리</th></tr>
                    </thead>
                    <tbody id="tbody-global-companies"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="crudModal" class="modal">
        <div class="modal-content">
            <div id="modalHeader" class="modal-header">항목 추가/수정</div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-delete" onclick="closeModal('crudModal')">취소</button>
                <button class="btn btn-add" onclick="saveData()">저장</button>
            </div>
        </div>
    </div>

    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div id="categoryHeader" class="modal-header">카테고리 관리</div>
            <div class="modal-body">
                <label>새 카테고리 (경로 형태 입력)</label>
                <div class="category-input-group">
                    <input type="text" id="newCategoryInput" placeholder="예: 경기도 > 성남시 분당구 > 삼평동">
                    <button class="btn btn-add" onclick="addCategory()">추가</button>
                </div>
                <div class="category-list" id="categoryList">
                    </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-delete" onclick="closeModal('categoryModal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">기업 상세 정보</div>
            <div id="detailBody" class="modal-body" style="background: #f8f9fa; padding: 20px; border-radius: 4px;">
                </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('detailModal')">확인</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 상태 (State) 초기화 ---
        
        // 지역 카테고리 데이터
        let categories = {
            'national': [
                '서울특별시 > 강남구 > 역삼동',
                '경기도 > 성남시 분당구 > 삼평동'
            ],
            'global': [
                '북미 > 미국 > 캘리포니아 > 쿠퍼티노',
                '아시아 > 일본 > 도쿄 > 미나토구'
            ]
        };

        // 전체 컨텐츠 데이터
        let store = {
            'region-jobs': [{ id: 1, region: '서울 > 강남구', company: '(주)테크솔루션', title: '프론트엔드 개발자 채용' }],
            'industry-jobs': [{ id: 1, category: 'IT·인터넷 > 웹개발', company: '코딩웍스', title: '웹 퍼블리셔 모집' }],
            'cert-info': [{ id: 1, category: 'IT/정보통신', name: '정보처리기사', agency: '한국산업인력공단' }],
            
            // 상세정보 포함 데이터
            'national-companies': [
                { id: 1, address: '경기도 > 성남시 분당구 > 삼평동', company: '판교네트웍스', size: '중견기업', ceo: '홍길동', empCount: '150명', desc: '판교에 위치한 유망한 IT 솔루션 전문 기업입니다.' }
            ],
            'global-companies': [
                { id: 1, address: '북미 > 미국 > 캘리포니아 > 쿠퍼티노', company: '글로벌 애플테크', industry: 'IT 하드웨어', ceo: '존 스미스', empCount: '10,000+명', desc: '세계를 선도하는 스마트 기기 및 소프트웨어 제조사입니다.' }
            ]
        };

        let currentTabId = 'region-jobs';
        let editTargetId = null;
        let currentCategoryType = null; // 'national' or 'global'

        document.addEventListener("DOMContentLoaded", () => {
            updateCategoryFilters();
            renderAll();
        });

        // --- 2. UI 렌더링 및 탭 전환 ---
        function switchTab(tabId, element) {
            currentTabId = tabId;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            
            // 탭 전환시 필터 초기화
            if(document.getElementById('filter-nat')) document.getElementById('filter-nat').value = '';
            if(document.getElementById('filter-glob')) document.getElementById('filter-glob').value = '';
            renderAll();
        }

        function renderAll() {
            renderTable('region-jobs', ['region', 'company', 'title']);
            renderTable('industry-jobs', ['category', 'company', 'title']);
            renderTable('cert-info', ['category', 'name', 'agency']);
            renderTable('national-companies', ['address', 'company', 'size'], true);
            renderTable('global-companies', ['address', 'company', 'industry'], true);
        }

        function renderTable(tabId, fields, hasDetails = false, filteredData = null) {
            const tbody = document.getElementById(`tbody-${tabId}`);
            if (!tbody) return;
            tbody.innerHTML = '';

            const dataList = filteredData || store[tabId];

            if(dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${fields.length + 1}" style="color:#999; padding:30px 0;">등록된 데이터가 없습니다.</td></tr>`;
                return;
            }

            dataList.forEach(item => {
                const tr = document.createElement('tr');
                fields.forEach((field, idx) => {
                    const td = document.createElement('td');
                    td.textContent = item[field];
                    if(idx > 0) td.className = 'left-align';
                    tr.appendChild(td);
                });

                const actionTd = document.createElement('td');
                let buttons = '';
                if(hasDetails) {
                    buttons += `<button class="btn btn-info" onclick="viewDetails('${tabId}', ${item.id})">상세보기</button>`;
                }
                buttons += `
                    <button class="btn btn-edit" onclick="openEditModal('${tabId}', ${item.id})">수정</button>
                    <button class="btn btn-delete" onclick="deleteData('${tabId}', ${item.id})">삭제</button>
                `;
                actionTd.innerHTML = buttons;
                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            });
        }

        // 필터링 기능 (지역 선택시)
        function filterTable(tabId, categoryValue) {
            if(!categoryValue) {
                renderTable(tabId, tabId === 'national-companies' ? ['address', 'company', 'size'] : ['address', 'company', 'industry'], true);
                return;
            }
            const filtered = store[tabId].filter(item => item.address === categoryValue);
            renderTable(tabId, tabId === 'national-companies' ? ['address', 'company', 'size'] : ['address', 'company', 'industry'], true, filtered);
        }

        function searchKeyword() {
            const kw = document.getElementById('searchInput').value.trim().toLowerCase();
            if(!kw) return renderAll();
            const filtered = store[currentTabId].filter(item => 
                Object.values(item).some(v => String(v).toLowerCase().includes(kw))
            );
            const fields = currentTabId === 'national-companies' ? ['address', 'company', 'size'] : 
                           currentTabId === 'global-companies' ? ['address', 'company', 'industry'] : 
                           currentTabId === 'region-jobs' ? ['region', 'company', 'title'] : 
                           ['category', 'company', 'title']; // 간이 설정
            renderTable(currentTabId, fields, currentTabId.includes('companies'), filtered);
        }

        // --- 3. 지역 카테고리 관리 기능 (CRUD) ---
        function updateCategoryFilters() {
            const natFilter = document.getElementById('filter-nat');
            const globFilter = document.getElementById('filter-glob');
            
            if(natFilter) {
                natFilter.innerHTML = '<option value="">-- 등록된 지역 필터링 --</option>';
                categories.national.forEach(cat => natFilter.innerHTML += `<option value="${cat}">${cat}</option>`);
            }
            if(globFilter) {
                globFilter.innerHTML = '<option value="">-- 등록된 세계지역 필터링 --</option>';
                categories.global.forEach(cat => globFilter.innerHTML += `<option value="${cat}">${cat}</option>`);
            }
        }

        function openCategoryModal(type) {
            currentCategoryType = type;
            document.getElementById('categoryHeader').textContent = (type === 'national' ? '전국' : '세계') + ' 지역 카테고리 관리';
            document.getElementById('newCategoryInput').value = '';
            renderCategoryList();
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function renderCategoryList() {
            const listDiv = document.getElementById('categoryList');
            listDiv.innerHTML = '';
            categories[currentCategoryType].forEach((cat, index) => {
                listDiv.innerHTML += `
                    <div class="category-item">
                        <span>${cat}</span>
                        <div>
                            <button class="btn btn-edit" onclick="editCategory(${index})">수정</button>
                            <button class="btn btn-delete" onclick="deleteCategory(${index})">삭제</button>
                        </div>
                    </div>
                `;
            });
        }

        function addCategory() {
            const val = document.getElementById('newCategoryInput').value.trim();
            if(!val) return alert("카테고리 경로를 입력하세요.");
            if(categories[currentCategoryType].includes(val)) return alert("이미 존재하는 카테고리입니다.");
            
            categories[currentCategoryType].push(val);
            document.getElementById('newCategoryInput').value = '';
            renderCategoryList();
            updateCategoryFilters();
        }

        function editCategory(index) {
            const oldVal = categories[currentCategoryType][index];
            const newVal = prompt("새로운 지역 경로를 입력하세요.", oldVal);
            if(newVal && newVal.trim() !== "" && newVal !== oldVal) {
                categories[currentCategoryType][index] = newVal.trim();
                
                // 기존 데이터에 매핑된 주소도 업데이트
                const tabId = currentCategoryType === 'national' ? 'national-companies' : 'global-companies';
                store[tabId].forEach(item => {
                    if(item.address === oldVal) item.address = newVal.trim();
                });
                
                renderCategoryList();
                updateCategoryFilters();
                renderAll();
            }
        }

        function deleteCategory(index) {
            const cat = categories[currentCategoryType][index];
            const tabId = currentCategoryType === 'national' ? 'national-companies' : 'global-companies';
            const isInUse = store[tabId].some(item => item.address === cat);
            
            if(isInUse) {
                alert("이 카테고리를 사용 중인 기업 정보가 있어 삭제할 수 없습니다.");
                return;
            }
            if(confirm(`'${cat}' 카테고리를 삭제하시겠습니까?`)) {
                categories[currentCategoryType].splice(index, 1);
                renderCategoryList();
                updateCategoryFilters();
            }
        }

        // --- 4. 데이터 추가 / 수정 (상세정보 포함) ---
        function openAddModal(tabId) {
            editTargetId = null;
            document.getElementById('modalHeader').textContent = "새 항목 추가";
            buildModalForm(tabId);
            document.getElementById('crudModal').style.display = 'flex';
        }

        function openEditModal(tabId, id) {
            editTargetId = id;
            document.getElementById('modalHeader').textContent = "항목 수정";
            buildModalForm(tabId);
            
            const item = store[tabId].find(d => d.id === id);
            if(item) {
                const inputs = document.querySelectorAll('#modalBody input, #modalBody select, #modalBody textarea');
                inputs.forEach(input => {
                    if(item[input.dataset.field] !== undefined) input.value = item[input.dataset.field];
                });
            }
            document.getElementById('crudModal').style.display = 'flex';
        }

        function buildModalForm(tabId) {
            const body = document.getElementById('modalBody');
            body.innerHTML = '';
            let config = [];

            if(tabId === 'national-companies') {
                config = [
                    { label: '행정구역 (지역)', field: 'address', type: 'select', source: categories.national },
                    { label: '기업명', field: 'company', type: 'text' },
                    { label: '기업규모', field: 'size', type: 'text' },
                    { label: '대표자', field: 'ceo', type: 'text' },
                    { label: '사원수', field: 'empCount', type: 'text' },
                    { label: '기업 상세설명', field: 'desc', type: 'textarea' }
                ];
            } else if(tabId === 'global-companies') {
                config = [
                    { label: '글로벌 위치', field: 'address', type: 'select', source: categories.global },
                    { label: '기업명', field: 'company', type: 'text' },
                    { label: '산업분야', field: 'industry', type: 'text' },
                    { label: '대표자', field: 'ceo', type: 'text' },
                    { label: '사원수', field: 'empCount', type: 'text' },
                    { label: '기업 상세설명', field: 'desc', type: 'textarea' }
                ];
            } else {
                // 1~3번 탭 간소화 폼
                config = [
                    { label: '분류/지역', field: tabId.includes('cert')?'category':'region', type: 'text' },
                    { label: '이름/기업명', field: tabId.includes('cert')?'name':'company', type: 'text' },
                    { label: '설명/제목/기관', field: tabId.includes('cert')?'agency':'title', type: 'text' }
                ];
            }

            config.forEach(c => {
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex'; wrapper.style.flexDirection = 'column'; wrapper.style.gap = '5px';
                
                const lbl = document.createElement('label'); lbl.textContent = c.label;
                wrapper.appendChild(lbl);

                let input;
                if(c.type === 'select') {
                    input = document.createElement('select');
                    c.source.forEach(opt => {
                        input.innerHTML += `<option value="${opt}">${opt}</option>`;
                    });
                } else if(c.type === 'textarea') {
                    input = document.createElement('textarea');
                } else {
                    input = document.createElement('input'); input.type = 'text';
                }
                
                input.dataset.field = c.field;
                wrapper.appendChild(input);
                body.appendChild(wrapper);
            });
        }

        function saveData() {
            const inputs = document.querySelectorAll('#modalBody input, #modalBody select, #modalBody textarea');
            let newItem = {};
            let isValid = true;

            inputs.forEach(input => {
                if(!input.value.trim() && input.dataset.field !== 'desc') {
                    isValid = false; input.style.borderColor = '#dc3545';
                } else {
                    input.style.borderColor = '#ccc';
                }
                newItem[input.dataset.field] = input.value.trim();
            });

            if(!isValid) return alert("필수 필드를 모두 채워주세요.");

            if (editTargetId === null) {
                newItem.id = store[currentTabId].length ? Math.max(...store[currentTabId].map(o => o.id)) + 1 : 1;
                store[currentTabId].push(newItem);
            } else {
                const idx = store[currentTabId].findIndex(d => d.id === editTargetId);
                if(idx !== -1) { newItem.id = editTargetId; store[currentTabId][idx] = newItem; }
            }

            renderAll();
            closeModal('crudModal');
        }

        function deleteData(tabId, id) {
            if(confirm("이 데이터를 완전히 삭제하시겠습니까?")) {
                store[tabId] = store[tabId].filter(item => item.id !== id);
                renderAll();
            }
        }

        // --- 5. 상세 정보 보기 (View Details) ---
        function viewDetails(tabId, id) {
            const item = store[tabId].find(d => d.id === id);
            if(!item) return;

            const body = document.getElementById('detailBody');
            body.innerHTML = `
                <div class="detail-row"><div class="detail-label">기업명</div><div class="detail-value">${item.company}</div></div>
                <div class="detail-row"><div class="detail-label">위치</div><div class="detail-value">${item.address}</div></div>
                <div class="detail-row"><div class="detail-label">${tabId==='national-companies'?'규모':'산업분야'}</div><div class="detail-value">${item.size || item.industry}</div></div>
                <div class="detail-row"><div class="detail-label">대표자</div><div class="detail-value">${item.ceo || '미등록'}</div></div>
                <div class="detail-row"><div class="detail-label">사원수</div><div class="detail-value">${item.empCount || '미등록'}</div></div>
                <div style="margin-top:15px;"><div class="detail-label" style="margin-bottom:8px;">기업 상세설명</div>
                <div style="background:#fff; padding:15px; border:1px solid #ddd; border-radius:4px; white-space:pre-wrap;">${item.desc || '등록된 상세 설명이 없습니다.'}</div></div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
    </script>
</body>
</html>
