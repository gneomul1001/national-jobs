<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가 취업 가상 포털</title>
    <style>
        /* 기본 스타일 및 Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f4f6fa;
            color: #333;
            line-height: 1.5;
        }

        /* 헤더 & 검색 영역 */
        header {
            background-color: #ffffff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0059cc;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 28px; font-weight: 900; color: #0059cc; letter-spacing: -1px; cursor: pointer;
        }
        .search-area { display: flex; align-items: center; width: 100%; max-width: 450px; }
        .search-area input {
            flex: 1; padding: 10px 15px; border: 2px solid #0059cc; border-radius: 4px 0 0 4px; outline: none; font-size: 15px;
        }
        .search-area button {
            padding: 10px 20px; background-color: #0059cc; color: #fff; border: 2px solid #0059cc; border-radius: 0 4px 4px 0; cursor: pointer; font-weight: bold; font-size: 15px;
        }
        .search-area button:hover { background-color: #004499; }

        /* 내비게이션 바 */
        nav {
            background-color: #0059cc; display: flex; padding: 0 20px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        nav::-webkit-scrollbar { display: none; }
        nav div {
            padding: 15px 20px; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        nav div:hover, nav div.active { background-color: #003d8c; }

        /* 메인 컨테이너 */
        .container {
            max-width: 1200px; margin: 20px auto; background: #ffffff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 500px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 컨트롤 패널 및 카테고리 브라우저 (다중 스크롤 뷰) */
        .control-panel {
            background-color: #f8f9fa; padding: 15px; border-radius: 4px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #e5e5e5; flex-wrap: wrap; gap: 10px;
        }
        
        /* 독립 스크롤 카테고리 UI (Miller Columns) */
        .category-browser {
            display: flex; gap: 10px; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin-bottom: 20px; overflow-x: auto;
        }
        .category-col {
            flex: 1; min-width: 180px; height: 160px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; background: #fafafa;
        }
        /* 스크롤바 커스텀 */
        .category-col::-webkit-scrollbar { width: 6px; }
        .category-col::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .category-col::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .category-col::-webkit-scrollbar-thumb:hover { background: #aaa; }

        .cat-item {
            padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .cat-item:hover { background: #eef5ff; }
        .cat-item.selected {
            background: #0059cc; color: #fff; font-weight: bold;
        }
        .cat-item.selected::after { content: '›'; font-size: 18px; margin-left: 10px; }

        /* 버튼 스타일 */
        .btn {
            padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; color: #fff; display: inline-flex; align-items: center; justify-content: center; gap: 3px;
        }
        .btn-add { background-color: #0059cc; padding: 10px 15px; font-size: 14px;}
        .btn-edit { background-color: #28a745; margin-right: 4px; }
        .btn-delete { background-color: #dc3545; }
        .btn-info { background-color: #17a2b8; margin-right: 4px;}
        .btn-secondary { background-color: #6c757d; padding: 10px 15px; font-size: 14px; margin-right: 5px;}
        .btn:hover { opacity: 0.9; }

        /* 테이블 스타일 */
        .table-responsive { width: 100%; overflow-x: auto; border: 1px solid #e5e5e5; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border-bottom: 1px solid #e5e5e5; padding: 14px 12px; text-align: center; font-size: 14px; }
        th { background-color: #f1f3f5; font-weight: bold; color: #333; border-bottom: 2px solid #dee2e6; }
        td.left-align { text-align: left; }
        h2 { margin-top: 0; color: #111; font-size: 22px; margin-bottom: 15px; }

        /* 모달 팝업 스타일 */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background-color: #fff; padding: 25px; border-radius: 8px; width: 100%; max-width: 550px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease; max-height: 90vh; overflow-y: auto;
        }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-body { display: flex; flex-direction: column; gap: 12px; }
        .modal-body label { font-size: 14px; font-weight: bold; color: #555; }
        .modal-body input, .modal-body select, .modal-body textarea {
            padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 100%;
        }
        .modal-body textarea { resize: vertical; min-height: 80px; }
        .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

        .category-list { border: 1px solid #ddd; border-radius: 4px; max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .category-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .category-item:last-child { border-bottom: none; }
        .category-input-group { display: flex; gap: 10px; }
        .category-input-group input { flex: 1; }
        .detail-row { display: flex; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .detail-label { font-weight: bold; width: 120px; color: #0059cc; flex-shrink: 0; }
        .detail-value { flex: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            header { padding: 15px 20px; justify-content: center; }
            .logo { text-align: center; width: 100%; }
            .search-area { max-width: 100%; }
            .container { padding: 15px; margin: 10px; }
            .control-panel { flex-direction: column; align-items: stretch; }
            .btn-add, .btn-secondary { width: 100%; text-align: center; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">JobPortal</div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="기업명, 키워드 검색">
            <button onclick="searchKeyword()">검색</button>
        </div>
    </header>

    <nav>
        <div class="nav-item active" onclick="switchTab('region-jobs', this)">지역별 공고</div>
        <div class="nav-item" onclick="switchTab('industry-jobs', this)">업종별 공고</div>
        <div class="nav-item" onclick="switchTab('cert-info', this)">자격증 정보</div>
        <div class="nav-item" onclick="switchTab('national-companies', this)">전국 기업정보</div>
        <div class="nav-item" onclick="switchTab('global-companies', this)">세계 기업정보</div>
    </nav>

    <div class="container">
        
        <div id="region-jobs" class="tab-content active">
            <h2>지역별 공고 관리</h2>
            <div class="control-panel"><button class="btn btn-add" onclick="openAddModal('region-jobs')">+ 공고 추가</button></div>
            <div class="table-responsive">
                <table><thead><tr><th>지역</th><th>기업명</th><th>공고 제목</th><th>관리</th></tr></thead><tbody id="tbody-region-jobs"></tbody></table>
            </div>
        </div>

        <div id="industry-jobs" class="tab-content">
            <h2>업종별 공고 관리</h2>
            <div class="control-panel"><button class="btn btn-add" onclick="openAddModal('industry-jobs')">+ 공고 추가</button></div>
            <div class="table-responsive">
                <table><thead><tr><th>업종 분류</th><th>기업명</th><th>공고 제목</th><th>관리</th></tr></thead><tbody id="tbody-industry-jobs"></tbody></table>
            </div>
        </div>

        <div id="cert-info" class="tab-content">
            <h2>자격증 정보 관리</h2>
            <div class="control-panel"><button class="btn btn-add" onclick="openAddModal('cert-info')">+ 자격증 추가</button></div>
            <div class="table-responsive">
                <table><thead><tr><th>분야(카테고리)</th><th>자격증명</th><th>시행기관</th><th>관리</th></tr></thead><tbody id="tbody-cert-info"></tbody></table>
            </div>
        </div>

        <div id="national-companies" class="tab-content">
            <h2>전국 기업정보 관리</h2>
            <div class="control-panel">
                <span style="font-weight: bold; color: #555;">지역별 필터링</span>
                <div>
                    <button class="btn btn-secondary" onclick="openCategoryModal('national')">⚙ 지역 카테고리 원본 관리</button>
                    <button class="btn btn-add" onclick="openAddModal('national-companies')">+ 기업 상세 추가</button>
                </div>
            </div>
            <div id="national-category-browser" class="category-browser"></div>
            
            <div class="table-responsive">
                <table><thead><tr><th>행정구역</th><th>기업명</th><th>규모</th><th>관리</th></tr></thead><tbody id="tbody-national-companies"></tbody></table>
            </div>
        </div>

        <div id="global-companies" class="tab-content">
            <h2>세계 기업정보 관리</h2>
            <div class="control-panel">
                <span style="font-weight: bold; color: #555;">글로벌 지역 필터링</span>
                <div>
                    <button class="btn btn-secondary" onclick="openCategoryModal('global')">⚙ 지역 카테고리 원본 관리</button>
                    <button class="btn btn-add" onclick="openAddModal('global-companies')">+ 기업 상세 추가</button>
                </div>
            </div>
            <div id="global-category-browser" class="category-browser"></div>
            
            <div class="table-responsive">
                <table><thead><tr><th>글로벌 위치</th><th>기업명</th><th>산업분야</th><th>관리</th></tr></thead><tbody id="tbody-global-companies"></tbody></table>
            </div>
        </div>

    </div>

    <div id="crudModal" class="modal">
        <div class="modal-content">
            <div id="modalHeader" class="modal-header">항목 추가/수정</div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-delete" onclick="closeModal('crudModal')">취소</button>
                <button class="btn btn-add" onclick="saveData()">저장</button>
            </div>
        </div>
    </div>

    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div id="categoryHeader" class="modal-header">카테고리 관리</div>
            <div class="modal-body">
                <label>새 카테고리 ('>' 기호로 계층 구분)</label>
                <div class="category-input-group">
                    <input type="text" id="newCategoryInput" placeholder="예: 경기도 > 성남시 분당구 > 삼평동">
                    <button class="btn btn-add" onclick="addCategory()">추가</button>
                </div>
                <div class="category-list" id="categoryList"></div>
            </div>
            <div class="modal-footer"><button class="btn btn-delete" onclick="closeModal('categoryModal')">닫기</button></div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">기업 상세 정보</div>
            <div id="detailBody" class="modal-body" style="background: #f8f9fa; padding: 20px; border-radius: 4px;"></div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('detailModal')">확인</button></div>
        </div>
    </div>

    <script>
        // --- 데이터 상태 ---
        let categories = {
            'national': [
                '서울특별시 > 강남구 > 역삼동',
                '서울특별시 > 강남구 > 삼성동',
                '경기도 > 성남시 분당구 > 삼평동',
                '경기도 > 성남시 분당구 > 정자동',
                '부산광역시 > 해운대구 > 우동'
            ],
            'global': [
                '북미 > 미국 > 캘리포니아 > 쿠퍼티노',
                '북미 > 미국 > 텍사스 > 오스틴',
                '아시아 > 일본 > 도쿄 > 미나토구',
                '유럽 > 영국 > 런던 > 시티오브런던'
            ]
        };

        let store = {
            'region-jobs': [{ id: 1, region: '서울 > 강남구', company: '(주)테크솔루션', title: '프론트엔드 개발자 채용' }],
            'industry-jobs': [{ id: 1, category: 'IT·인터넷 > 웹개발', company: '코딩웍스', title: '웹 퍼블리셔 모집' }],
            'cert-info': [{ id: 1, category: 'IT/정보통신', name: '정보처리기사', agency: '한국산업인력공단' }],
            'national-companies': [
                { id: 1, address: '경기도 > 성남시 분당구 > 삼평동', company: '판교네트웍스', size: '중견기업', ceo: '홍길동', empCount: '150명', desc: '판교에 위치한 유망한 IT 기업입니다.' },
                { id: 2, address: '서울특별시 > 강남구 > 역삼동', company: '강남스타트업', size: '스타트업', ceo: '이순신', empCount: '30명', desc: '혁신적인 서비스를 만드는 곳입니다.' }
            ],
            'global-companies': [
                { id: 1, address: '북미 > 미국 > 캘리포니아 > 쿠퍼티노', company: '글로벌 애플테크', industry: 'IT 하드웨어', ceo: '존 스미스', empCount: '10,000+명', desc: '스마트 기기 제조사입니다.' }
            ]
        };

        let currentTabId = 'region-jobs';
        let editTargetId = null;
        let currentCategoryType = null; 
        
        // 브라우저용 선택 상태 [level1, level2, level3 ...]
        let selectedCategories = { national: [], global: [] };

        document.addEventListener("DOMContentLoaded", () => {
            renderAll();
        });

        // 탭 전환
        function switchTab(tabId, element) {
            currentTabId = tabId;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            
            // 탭 이동 시 카테고리 필터 초기화 후 렌더링
            if(tabId === 'national-companies') {
                selectedCategories.national = [];
                renderCategoryBrowser('national');
            } else if(tabId === 'global-companies') {
                selectedCategories.global = [];
                renderCategoryBrowser('global');
            }
        }

        // 전체 렌더링
        function renderAll() {
            renderTable('region-jobs', ['region', 'company', 'title']);
            renderTable('industry-jobs', ['category', 'company', 'title']);
            renderTable('cert-info', ['category', 'name', 'agency']);
            renderCategoryBrowser('national');
            renderCategoryBrowser('global');
        }

        // 테이블 렌더링
        function renderTable(tabId, fields, hasDetails = false, filteredData = null) {
            const tbody = document.getElementById(`tbody-${tabId}`);
            if (!tbody) return;
            tbody.innerHTML = '';
            const dataList = filteredData || store[tabId];

            if(dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${fields.length + 1}" style="color:#999; padding:30px 0;">데이터가 없습니다.</td></tr>`;
                return;
            }

            dataList.forEach(item => {
                const tr = document.createElement('tr');
                fields.forEach((field, idx) => {
                    const td = document.createElement('td'); td.textContent = item[field];
                    if(idx > 0) td.className = 'left-align';
                    tr.appendChild(td);
                });

                const actionTd = document.createElement('td');
                let buttons = hasDetails ? `<button class="btn btn-info" onclick="viewDetails('${tabId}', ${item.id})">상세보기</button>` : '';
                buttons += `<button class="btn btn-edit" onclick="openEditModal('${tabId}', ${item.id})">수정</button>
                            <button class="btn btn-delete" onclick="deleteData('${tabId}', ${item.id})">삭제</button>`;
                actionTd.innerHTML = buttons; tr.appendChild(actionTd); tbody.appendChild(tr);
            });
        }

        // --- 다중 독립 스크롤 카테고리 브라우저 (Miller Columns) ---
        function renderCategoryBrowser(type) {
            const container = document.getElementById(`${type}-category-browser`);
            if(!container) return;
            
            const allPaths = categories[type].map(c => c.split('>').map(s => s.trim()));
            const selections = selectedCategories[type];
            let html = '';
            
            // 최대 노출 뎁스 지정 (전국은 주로 3, 글로벌은 최대 5)
            const maxDepth = type === 'global' ? 5 : 3;

            for(let depth = 0; depth < maxDepth; depth++) {
                let availableItems = new Set();
                
                // 현재 뎁스에 표시할 유효한 아이템 색인
                allPaths.forEach(path => {
                    let match = true;
                    // 상위 뎁스까지의 선택이 현재 경로와 일치하는지 확인
                    for(let i = 0; i < depth; i++) {
                        if(path[i] !== selections[i]) match = false;
                    }
                    if(match && path[depth]) availableItems.add(path[depth]);
                });

                // 더 이상 표시할 하위 카테고리가 없고 선택도 안된 상태면 컬럼 생성 중단
                if(availableItems.size === 0 && depth >= selections.length) break;

                html += `<div class="category-col">`;
                availableItems.forEach(item => {
                    const isSelected = selections[depth] === item;
                    html += `<div class="cat-item ${isSelected ? 'selected' : ''}" 
                                  onclick="selectCategoryLevel('${type}', ${depth}, '${item}')">
                                  ${item}
                             </div>`;
                });
                html += `</div>`;
            }
            container.innerHTML = html;
            
            // 선택된 카테고리로 테이블 즉시 필터링
            filterTableByCategory(type);
        }

        // 카테고리 아이템 클릭 시 로직
        function selectCategoryLevel(type, depth, value) {
            // 이미 선택된 것을 다시 누르면 토글 해제 (해당 뎁스부터 하위 뎁스 모두 초기화)
            if (selectedCategories[type][depth] === value) {
                selectedCategories[type] = selectedCategories[type].slice(0, depth);
            } else {
                // 새로운 항목 선택 시 해당 뎁스 업데이트 후 하위 뎁스 초기화
                selectedCategories[type] = selectedCategories[type].slice(0, depth);
                selectedCategories[type].push(value);
            }
            renderCategoryBrowser(type);
        }

        // 선택된 카테고리 배열 조합을 통해 테이블 데이터 필터링
        function filterTableByCategory(type) {
            const tabId = type === 'national' ? 'national-companies' : 'global-companies';
            const selections = selectedCategories[type];
            const prefix = selections.join(' > '); // 예: "경기도 > 성남시 분당구"
            
            let filtered = store[tabId];
            if(prefix) {
                // 시작하는 문자열로 필터링 (하위 항목 모두 표기)
                filtered = store[tabId].filter(item => item.address.startsWith(prefix));
            }
            const fields = type === 'national' ? ['address', 'company', 'size'] : ['address', 'company', 'industry'];
            renderTable(tabId, fields, true, filtered);
        }

        // --- 원본 카테고리 관리 기능 (추가/수정/삭제) ---
        function openCategoryModal(type) {
            currentCategoryType = type;
            document.getElementById('categoryHeader').textContent = (type === 'national' ? '전국' : '세계') + ' 카테고리 원본 관리';
            document.getElementById('newCategoryInput').value = '';
            renderCategoryList();
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function renderCategoryList() {
            const listDiv = document.getElementById('categoryList');
            listDiv.innerHTML = '';
            categories[currentCategoryType].forEach((cat, index) => {
                listDiv.innerHTML += `<div class="category-item"><span>${cat}</span>
                    <div><button class="btn btn-edit" onclick="editCategory(${index})">수정</button>
                         <button class="btn btn-delete" onclick="deleteCategory(${index})">삭제</button></div></div>`;
            });
        }

        function addCategory() {
            const val = document.getElementById('newCategoryInput').value.trim();
            if(!val) return alert("카테고리 경로를 입력하세요.");
            if(categories[currentCategoryType].includes(val)) return alert("이미 존재하는 카테고리입니다.");
            categories[currentCategoryType].push(val);
            document.getElementById('newCategoryInput').value = '';
            renderCategoryList();
            renderCategoryBrowser(currentCategoryType);
        }

        function editCategory(index) {
            const oldVal = categories[currentCategoryType][index];
            const newVal = prompt("새로운 지역 경로를 입력하세요. ('>'로 구분)", oldVal);
            if(newVal && newVal.trim() !== "" && newVal !== oldVal) {
                categories[currentCategoryType][index] = newVal.trim();
                const tabId = currentCategoryType === 'national' ? 'national-companies' : 'global-companies';
                store[tabId].forEach(item => { if(item.address === oldVal) item.address = newVal.trim(); });
                renderCategoryList();
                renderCategoryBrowser(currentCategoryType);
            }
        }

        function deleteCategory(index) {
            const cat = categories[currentCategoryType][index];
            const tabId = currentCategoryType === 'national' ? 'national-companies' : 'global-companies';
            if(store[tabId].some(item => item.address === cat)) return alert("사용 중인 기업 정보가 있어 삭제할 수 없습니다.");
            if(confirm(`'${cat}' 카테고리를 삭제하시겠습니까?`)) {
                categories[currentCategoryType].splice(index, 1);
                renderCategoryList();
                renderCategoryBrowser(currentCategoryType);
            }
        }

        // --- 기타 기능 (추가/수정/상세보기/검색) ---
        function searchKeyword() {
            const kw = document.getElementById('searchInput').value.trim().toLowerCase();
            if(!kw) {
                // 검색어가 없으면 필터링 리셋
                if(['national-companies', 'global-companies'].includes(currentTabId)) {
                    renderCategoryBrowser(currentTabId === 'national-companies' ? 'national' : 'global');
                } else { renderAll(); }
                return;
            }
            const filtered = store[currentTabId].filter(item => Object.values(item).some(v => String(v).toLowerCase().includes(kw)));
            const fields = currentTabId === 'national-companies' ? ['address', 'company', 'size'] : 
                           currentTabId === 'global-companies' ? ['address', 'company', 'industry'] : 
                           currentTabId === 'region-jobs' ? ['region', 'company', 'title'] : ['category', 'company', 'title'];
            renderTable(currentTabId, fields, currentTabId.includes('companies'), filtered);
        }

        function openAddModal(tabId) {
            editTargetId = null; document.getElementById('modalHeader').textContent = "새 항목 추가";
            buildModalForm(tabId); document.getElementById('crudModal').style.display = 'flex';
        }

        function openEditModal(tabId, id) {
            editTargetId = id; document.getElementById('modalHeader').textContent = "항목 수정";
            buildModalForm(tabId);
            const item = store[tabId].find(d => d.id === id);
            if(item) {
                document.querySelectorAll('#modalBody input, #modalBody select, #modalBody textarea').forEach(input => {
                    if(item[input.dataset.field] !== undefined) input.value = item[input.dataset.field];
                });
            }
            document.getElementById('crudModal').style.display = 'flex';
        }

        function buildModalForm(tabId) {
            const body = document.getElementById('modalBody'); body.innerHTML = '';
            let config = [];
            if(tabId === 'national-companies') {
                config = [{ label: '행정구역', field: 'address', type: 'select', source: categories.national }, { label: '기업명', field: 'company', type: 'text' }, { label: '기업규모', field: 'size', type: 'text' }, { label: '대표자', field: 'ceo', type: 'text' }, { label: '사원수', field: 'empCount', type: 'text' }, { label: '상세설명', field: 'desc', type: 'textarea' }];
            } else if(tabId === 'global-companies') {
                config = [{ label: '글로벌 위치', field: 'address', type: 'select', source: categories.global }, { label: '기업명', field: 'company', type: 'text' }, { label: '산업분야', field: 'industry', type: 'text' }, { label: '대표자', field: 'ceo', type: 'text' }, { label: '사원수', field: 'empCount', type: 'text' }, { label: '상세설명', field: 'desc', type: 'textarea' }];
            } else {
                config = [{ label: '분류/지역', field: tabId.includes('cert')?'category':'region', type: 'text' }, { label: '이름/기업명', field: tabId.includes('cert')?'name':'company', type: 'text' }, { label: '설명/제목/기관', field: tabId.includes('cert')?'agency':'title', type: 'text' }];
            }

            config.forEach(c => {
                const wrapper = document.createElement('div'); wrapper.style.display = 'flex'; wrapper.style.flexDirection = 'column'; wrapper.style.gap = '5px';
                const lbl = document.createElement('label'); lbl.textContent = c.label; wrapper.appendChild(lbl);
                let input;
                if(c.type === 'select') {
                    input = document.createElement('select');
                    c.source.forEach(opt => { input.innerHTML += `<option value="${opt}">${opt}</option>`; });
                } else if(c.type === 'textarea') { input = document.createElement('textarea'); } 
                else { input = document.createElement('input'); input.type = 'text'; }
                input.dataset.field = c.field; wrapper.appendChild(input); body.appendChild(wrapper);
            });
        }

        function saveData() {
            const inputs = document.querySelectorAll('#modalBody input, #modalBody select, #modalBody textarea');
            let newItem = {}; let isValid = true;
            inputs.forEach(input => {
                if(!input.value.trim() && input.dataset.field !== 'desc') { isValid = false; input.style.borderColor = '#dc3545'; } 
                else { input.style.borderColor = '#ccc'; }
                newItem[input.dataset.field] = input.value.trim();
            });
            if(!isValid) return alert("필수 필드를 채워주세요.");

            if (editTargetId === null) {
                newItem.id = store[currentTabId].length ? Math.max(...store[currentTabId].map(o => o.id)) + 1 : 1;
                store[currentTabId].push(newItem);
            } else {
                const idx = store[currentTabId].findIndex(d => d.id === editTargetId);
                if(idx !== -1) { newItem.id = editTargetId; store[currentTabId][idx] = newItem; }
            }
            renderAll(); closeModal('crudModal');
        }

        function deleteData(tabId, id) {
            if(confirm("이 데이터를 삭제하시겠습니까?")) {
                store[tabId] = store[tabId].filter(item => item.id !== id);
                renderAll();
            }
        }

        function viewDetails(tabId, id) {
            const item = store[tabId].find(d => d.id === id); if(!item) return;
            const body = document.getElementById('detailBody');
            body.innerHTML = `
                <div class="detail-row"><div class="detail-label">기업명</div><div class="detail-value">${item.company}</div></div>
                <div class="detail-row"><div class="detail-label">위치</div><div class="detail-value">${item.address}</div></div>
                <div class="detail-row"><div class="detail-label">${tabId==='national-companies'?'규모':'산업분야'}</div><div class="detail-value">${item.size || item.industry}</div></div>
                <div class="detail-row"><div class="detail-label">대표자</div><div class="detail-value">${item.ceo || '미등록'}</div></div>
                <div class="detail-row"><div class="detail-label">사원수</div><div class="detail-value">${item.empCount || '미등록'}</div></div>
                <div style="margin-top:15px;"><div class="detail-label" style="margin-bottom:8px;">상세설명</div>
                <div style="background:#fff; padding:15px; border:1px solid #ddd; border-radius:4px; white-space:pre-wrap;">${item.desc || '설명이 없습니다.'}</div></div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
    </script>
</body>
</html>
